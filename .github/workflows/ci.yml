name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *' # Once per day at 10am UTC

jobs:
  c-coverage:
    name: C source coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install coverage tools
        run: sudo apt-get update && sudo apt-get install -y gcovr
      - name: Run C coverage check
        run: make c-coverage-check

  test:
    name: OTP ${{ matrix.otp }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        otp: ['28', '29']

    env:
      ERL_LIBS: './'

    steps:
      - uses: actions/checkout@v6
      - name: Checkout Proper
        uses: actions/checkout@v6
        with:
          repository: proper-testing/proper
          path: "./proper"
      - uses: erlef/setup-beam@v1.24.0
        with:
          otp-version: ${{ matrix.otp }}
          version-type: loose
      - name: Run test
        run: |
          make
          make tests
